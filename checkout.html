<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Lumine</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://db.onlinewebfonts.com/c/25df0280fec38f4b5ba0acf8fb265940?family=Lucidity+Expand" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CART CONTENT -->
    <main class="checkout-main">
        <section class="cart-details">
            <h1>Your Order</h1><br>
            <div id="cartItems"></div>
            <div class="cart-total">
                <h2>Total: ₱<span id="cartTotal">0</span></h2>
            </div>
        </section>
        <section class="checkout-form">
            <form method="POST" action="index.html">
                <h2 style="margin-top: 0;">Billing Address</h2>

                <label for="name">Full Name: <span>(Required)</span></label>
                <input type="text" id="name" required>

                <label for="phone">Phone Number: <span>(Required)</span></label>
                <input type="tel" id="phone" name="phone" required>

                <label for="email">Email: <span>(Required)</span></label>
                <input type="email" id="email" name="email" required>

                <label for="address">Address: <span>(Required)</span></label>
                <input type="text" id="address" name="address" required>

                <h2>Payment Details</h2>
                <ul class="payment-icons">
                    <li class="fa fa-cc-mastercard"></li>
                    <li class="fa fa-cc-visa"></li>
                    <li class="fa fa-cc-jcb"></li>
                    <li class="fa fa-cc-amex"></li>
                </ul>
                <label for="cardName">Name on Card: <span>(Required)</span></label>
                <input type="text" id="cardName" name="cardName" required>

                <label for="cardNum">Card Number: <span>(Required)</span></label>
                <input type="number" id="cardNum" name="cardNum" required>

                <label for="expiryDate">Expiry Date (MM/YY): <span>(Required)</span></label>
                <input type="text" id="expiryDate" name="expiryDate" required>

                <label for="ccv">CCV: <span>(Required)</span></label>
                <input type="number" id="ccv" name="ccv" required>

                <button type="submit" class="placeOrder">PLACE ORDER</button>
            </form>
        </section>
    </main>
    <script src="js/cart.js"></script>
    <script>
    function myFunction() {
        var x = document.getElementById("myTopnav");
        x.classList.toggle("responsive");    
    }
    </script>
</body>
</html>
