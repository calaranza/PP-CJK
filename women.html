    <main class="collection">

        <section class="product-grid">
            <div class="product-card" onclick="openProduct('flowerdress')">
                <img src="img/Lumine_Flower_Dress.jpg" alt="Flower Dress">
                <b>Lumine Autumn Flower Dress</b>
                <p>₱1299</p>
            </div>

            <div class="product-card" onclick="openProduct('crop')">
                <img src="img/Lumine_Long_Sleeve_Crop_White_Front.jpeg" alt="Crop Top">
                <b>Lumine Long Sleeve Crop</b>
                <p>₱1299</p>
            </div>

            <div class="product-card" style="cursor: default;">
                <div style="width: 100%; height: 350px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #ccc;">
                    <span>Coming Soon</span>
                </div>
                <b>Classic Essential Tee</b>

            </div>

                <p>₱1599</p>
            </div>
        </section>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-layout">
                <div class="gallery">
                    <img id="mainImage" class="main-image" src="">
                    <div class="thumbnails">
                        <img id="frontThumb" class="thumb" src="" onclick="setMainImage(this.src)">
                        <img id="backThumb" class="thumb" src="" onclick="setMainImage(this.src)">
                    </div>
                </div>

                <div class="product-details">
                    <h2></h2>
                    <p class="price"></p>

                    <div class="size-header">
                        <label>Size</label>
                        <a href="javascript:void(0)" class="size-guide-btn" onclick="openSizeChart()">Size Guide</a>
                    </div>
                    
                    <div class="sizes">
                        <button type="button">S</button>
                        <button type="button">M</button>
                        <button type="button">L</button>
                        <button type="button">XL</button>
                    </div>

                    <label>Color</label>
                    <div class="colors"></div>

                    <button class="add-cart">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sizeChartModal" class="modal chart-modal">
        <div class="modal-content chart-content">
            <span class="close" onclick="closeSizeChart()">&times;</span>
            <img id="chartImage" src="" alt="Size Chart">
        </div>
    </div>
